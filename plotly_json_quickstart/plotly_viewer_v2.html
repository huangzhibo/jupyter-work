<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Viewer</title>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: #e5e5e5;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --success: #34c759;
            --error: #ff3b30;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.85);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .badge {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .badge.plotly { background: #e3f2fd; color: #1565c0; }
        .badge.cytoscape { background: #f3e5f5; color: #7b1fa2; }

        .topbar-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 7px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }
        .btn-ghost:hover { background: var(--bg); color: var(--text); }

        .main {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            gap: 16px;
            height: calc(100vh - 57px);
        }

        .panel-input {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-chart {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: #f0f7ff;
        }

        .drop-zone-icon {
            font-size: 28px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .drop-zone-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .drop-zone-text strong {
            color: var(--accent);
            cursor: pointer;
        }

        .editor-wrap {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .editor-wrap .card {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .json-input {
            flex: 1;
            width: 100%;
            border: none;
            padding: 12px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            resize: none;
            outline: none;
            background: var(--surface);
            color: var(--text);
        }

        .chart-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chart-area.card {
            min-height: 500px;
        }

        .placeholder {
            text-align: center;
            color: var(--text-secondary);
        }

        .placeholder-icon {
            font-size: 48px;
            opacity: 0.15;
            margin-bottom: 12px;
        }

        .placeholder p {
            font-size: 13px;
        }

        .placeholder kbd {
            font-family: inherit;
            font-size: 11px;
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
        }

        .examples-row {
            display: flex;
            gap: 6px;
        }

        .btn-example {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            color: var(--text);
        }
        .btn-example:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .toast {
            position: fixed;
            top: 70px;
            right: 20px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transform: translateX(calc(100% + 30px));
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 320px;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { background: #f0faf0; color: #1a7a2e; border: 1px solid #c6ecc6; }
        .toast.error { background: #fef0f0; color: #c62828; border: 1px solid #f5c6c6; }

        .file-info {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: var(--bg);
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .file-info.visible { display: flex; }

        @media (max-width: 860px) {
            .main {
                flex-direction: column;
                height: auto;
            }
            .panel-input {
                width: 100%;
            }
            .chart-area.card {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <h1>Chart Viewer</h1>
            <span id="formatBadge" class="badge">Plotly / Cytoscape</span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
            <button class="btn btn-primary" onclick="renderChart()">Render</button>
        </div>
    </div>

    <div class="main">
        <div class="panel-input">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">&#8693;</div>
                <div class="drop-zone-text">
                    Drop JSON file here<br>or <strong id="browseLink">browse</strong>
                </div>
                <input type="file" id="fileInput" accept=".json" style="display:none">
            </div>

            <div class="file-info" id="fileInfo">
                <span id="fileName"></span>
                <span id="fileSize"></span>
            </div>

            <div class="editor-wrap">
                <div class="card">
                    <div class="editor-header">
                        <span>JSON</span>
                        <span id="jsonSize"></span>
                    </div>
                    <textarea id="jsonInput" class="json-input" placeholder="Paste JSON data here..." spellcheck="false"></textarea>
                </div>
            </div>

            <div class="examples-row">
                <button class="btn-example" onclick="loadPlotlyExample()">Plotly Example</button>
                <button class="btn-example" onclick="loadCytoscapeExample()">Cytoscape Example</button>
            </div>
        </div>

        <div class="panel-chart">
            <div class="chart-area card" id="chartArea">
                <div class="placeholder" id="placeholder">
                    <div class="placeholder-icon">&#9671;</div>
                    <p>Drop a file or paste JSON, then click <kbd>Render</kbd></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentChart = null;

        const $ = id => document.getElementById(id);

        // --- Toast ---
        function toast(msg, type) {
            const prev = document.querySelector('.toast');
            if (prev) prev.remove();
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            document.body.appendChild(el);
            requestAnimationFrame(() => el.classList.add('show'));
            setTimeout(() => {
                el.classList.remove('show');
                setTimeout(() => el.remove(), 300);
            }, type === 'error' ? 5000 : 3000);
        }

        // --- Format detection ---
        function detectFormat(data) {
            if (data.data && Array.isArray(data.data)) return 'plotly';
            if (data.elements && (Array.isArray(data.elements) || (data.elements.nodes || data.elements.edges))) return 'cytoscape';
            return null;
        }

        function updateBadge(format) {
            const badge = $('formatBadge');
            badge.className = 'badge';
            if (format === 'plotly') {
                badge.textContent = 'Plotly';
                badge.classList.add('plotly');
            } else if (format === 'cytoscape') {
                badge.textContent = 'Cytoscape';
                badge.classList.add('cytoscape');
            } else {
                badge.textContent = 'Plotly / Cytoscape';
            }
        }

        function updateJsonSize() {
            const len = $('jsonInput').value.length;
            $('jsonSize').textContent = len > 0 ? formatBytes(len) : '';
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        $('jsonInput').addEventListener('input', updateJsonSize);

        // --- File handling ---
        function loadFile(file) {
            if (!file.name.toLowerCase().endsWith('.json')) {
                toast('Please select a .json file', 'error');
                return;
            }
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    JSON.parse(e.target.result);
                    $('jsonInput').value = e.target.result;
                    updateJsonSize();
                    $('fileName').textContent = file.name;
                    $('fileSize').textContent = formatBytes(file.size);
                    $('fileInfo').classList.add('visible');
                    toast(`Loaded ${file.name}`, 'success');
                } catch (err) {
                    toast(`Invalid JSON: ${err.message}`, 'error');
                }
            };
            reader.readAsText(file);
        }

        // File input
        $('fileInput').addEventListener('change', e => {
            if (e.target.files[0]) loadFile(e.target.files[0]);
        });
        $('browseLink').addEventListener('click', () => $('fileInput').click());
        $('dropZone').addEventListener('click', e => {
            if (e.target.id !== 'browseLink') $('fileInput').click();
        });

        // Drag and drop
        const dropZone = $('dropZone');
        ['dragenter', 'dragover'].forEach(evt =>
            dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('dragover'); })
        );
        ['dragleave', 'drop'].forEach(evt =>
            dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'))
        );
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
        });

        // Global drag-drop on chart area
        const chartArea = $('chartArea');
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
            e.preventDefault();
            if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
        });

        // --- Render ---
        function renderChart() {
            const raw = $('jsonInput').value.trim();
            if (!raw) { toast('No JSON data', 'error'); return; }

            let data;
            try {
                data = JSON.parse(raw);
            } catch (err) {
                toast(`JSON parse error: ${err.message}`, 'error');
                return;
            }

            const format = detectFormat(data);
            updateBadge(format);

            if (format === 'plotly') renderPlotly(data);
            else if (format === 'cytoscape') renderCytoscape(data);
            else toast('Unrecognized format. Expected Plotly (data[]) or Cytoscape (elements[]).', 'error');
        }

        function renderPlotly(data) {
            const area = $('chartArea');
            area.innerHTML = '';
            area.style.display = 'block';
            Plotly.newPlot(area, data.data, data.layout || {}, {
                responsive: true,
                displayModeBar: true,
                displaylogo: false
            });
            currentChart = 'plotly';
            toast('Plotly chart rendered', 'success');
        }

        const DEFAULT_CYTOSCAPE_STYLE = [
            { selector: 'node', style: {
                'background-color': '#0071e3', 'label': 'data(label)',
                'color': '#1d1d1f', 'font-size': '11px', 'text-valign': 'bottom',
                'text-margin-y': 6, 'width': 28, 'height': 28
            }},
            { selector: 'edge', style: {
                'width': 1.5, 'line-color': '#c7c7cc', 'curve-style': 'bezier',
                'target-arrow-color': '#c7c7cc', 'target-arrow-shape': 'triangle'
            }}
        ];

        const DEFAULT_CYTOSCAPE_LAYOUT = { name: 'cose', animate: true, animationDuration: 500 };

        function renderCytoscape(data) {
            let elements = data.elements;
            if (!Array.isArray(elements) && (elements.nodes || elements.edges)) {
                elements = [...(elements.nodes || []), ...(elements.edges || [])];
            }

            elements = elements.filter(el => el.data && el.data.id);
            if (elements.length === 0) { toast('No valid elements found', 'error'); return; }

            // Add missing labels for nodes
            elements.forEach(el => {
                if (el.data && !el.data.source && !el.data.label) {
                    el.data.label = el.data.id;
                }
            });

            const area = $('chartArea');
            area.innerHTML = '';
            area.style.display = 'block';
            area.style.width = '100%';
            area.style.height = '100%';

            const cy = cytoscape({
                container: area,
                elements: elements,
                style: data.style || DEFAULT_CYTOSCAPE_STYLE,
                layout: data.layout || DEFAULT_CYTOSCAPE_LAYOUT,
                wheelSensitivity: 0.2,
                minZoom: 0.1,
                maxZoom: 3
            });

            cy.on('layoutstop', () => toast('Network graph rendered', 'success'));

            cy.on('tap', 'node', evt => {
                const d = evt.target.data();
                let info = d.label || d.id;
                if (d.degree !== undefined) info += ` (degree: ${d.degree})`;
                toast(info, 'success');
            });

            cy.on('tap', 'edge', evt => {
                const d = evt.target.data();
                let info = `${d.source} → ${d.target}`;
                if (d.score !== undefined) info += ` (score: ${d.score.toFixed(3)})`;
                toast(info, 'success');
            });

            cy.on('dblclick', () => { cy.fit(); toast('View reset', 'success'); });

            currentChart = 'cytoscape';
        }

        // --- Clear ---
        function clearAll() {
            $('jsonInput').value = '';
            $('fileInfo').classList.remove('visible');
            $('jsonSize').textContent = '';
            updateBadge(null);
            const area = $('chartArea');
            area.style.display = '';
            area.innerHTML = `<div class="placeholder" id="placeholder">
                <div class="placeholder-icon">&#9671;</div>
                <p>Drop a file or paste JSON, then click <kbd>Render</kbd></p>
            </div>`;
            currentChart = null;
        }

        // --- Examples ---
        function loadPlotlyExample() {
            const data = {
                data: [{
                    type: 'scatter', mode: 'lines+markers', name: 'Series A',
                    x: [1, 2, 3, 4, 5, 6, 7, 8],
                    y: [2, 5, 3, 8, 5, 9, 7, 11],
                    line: { color: '#0071e3', width: 2, shape: 'spline' },
                    marker: { size: 7 }
                }, {
                    type: 'scatter', mode: 'lines+markers', name: 'Series B',
                    x: [1, 2, 3, 4, 5, 6, 7, 8],
                    y: [1, 3, 5, 4, 7, 6, 10, 8],
                    line: { color: '#34c759', width: 2, shape: 'spline' },
                    marker: { size: 7 }
                }],
                layout: {
                    title: { text: 'Sample Chart', font: { size: 18 } },
                    xaxis: { title: 'X', gridcolor: '#f0f0f0' },
                    yaxis: { title: 'Y', gridcolor: '#f0f0f0' },
                    plot_bgcolor: 'white', paper_bgcolor: 'white',
                    font: { family: '-apple-system, sans-serif' }
                }
            };
            $('jsonInput').value = JSON.stringify(data, null, 2);
            updateJsonSize();
            updateBadge('plotly');
            toast('Plotly example loaded', 'success');
        }

        function loadCytoscapeExample() {
            const data = {
                elements: [
                    { data: { id: 'TP53', label: 'TP53' } },
                    { data: { id: 'MDM2', label: 'MDM2' } },
                    { data: { id: 'BRCA1', label: 'BRCA1' } },
                    { data: { id: 'ATM', label: 'ATM' } },
                    { data: { id: 'CHEK2', label: 'CHEK2' } },
                    { data: { id: 'e1', source: 'TP53', target: 'MDM2' } },
                    { data: { id: 'e2', source: 'BRCA1', target: 'TP53' } },
                    { data: { id: 'e3', source: 'ATM', target: 'TP53' } },
                    { data: { id: 'e4', source: 'ATM', target: 'CHEK2' } },
                    { data: { id: 'e5', source: 'CHEK2', target: 'BRCA1' } }
                ]
            };
            $('jsonInput').value = JSON.stringify(data, null, 2);
            updateJsonSize();
            updateBadge('cytoscape');
            toast('Cytoscape example loaded', 'success');
        }

        // --- Keyboard shortcut ---
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                renderChart();
            }
        });
    </script>
</body>
</html>
